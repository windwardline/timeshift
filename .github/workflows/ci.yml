name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # `npm ci` runs `prisma generate` via postinstall, which needs the datasource
      # variable to be present. Never connected to — schema generation only.
      DATABASE_URL: postgres://ci:ci@localhost:5432/timeshift_ci

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      # `test` is vitest in watch mode; `test:run` is the single-shot variant.
      - name: Run Tests
        run: npm run test:run

      - name: Build
        run: npm run build
